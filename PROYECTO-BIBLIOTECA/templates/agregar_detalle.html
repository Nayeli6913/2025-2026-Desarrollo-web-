{% extends "base.html" %}

{% block content %}
<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card shadow">
                <div class="card-header text-white text-center" style="background-color: #2c3e50;">
                    <h4>Asignar Libro a Préstamo</h4>
                </div>
                <div class="card-body">
                    <form action="/guardar_detalle" method="POST">
                        <div class="mb-3">
                            <label class="form-label">Seleccionar Préstamo:</label>
                            <select name="id_prestamo" class="form-select" required>
                                {% for p in prestamos %}
                                <option value="{{ p[0] }}">ID: {{ p[0] }} - {{ p[1] }}</option>
                                {% endfor %}
                            </select>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Seleccionar Libro:</label>
                            <select name="id_libro" class="form-select" required>
                                {% for l in libros %}
                                <option value="{{ l[0] }}">{{ l[1] }}</option>
                                {% endfor %}
                            </select>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Cantidad:</label>
                            <input type="number" name="cantidad" class="form-control" value="1" required>
                        </div>
                        <button type="submit" class="btn btn-primary w-100">Guardar Detalle</button>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
